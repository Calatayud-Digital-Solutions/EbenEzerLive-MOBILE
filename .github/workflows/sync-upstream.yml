name: Sync to upstream

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to upstream repository
        env:
          UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_REPO_TOKEN }}
          UPSTREAM_REPO: AdiCampan/EbenEzerLive-MOBILE
          UPSTREAM_BRANCH: master
        run: |
          set -euo pipefail

          if [ -z "${UPSTREAM_TOKEN}" ]; then
            echo "UPSTREAM_REPO_TOKEN secret is not configured."
            exit 1
          fi

          git config --local credential.helper ""
          unset GITHUB_TOKEN

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git push \
            "https://oauth2:${UPSTREAM_TOKEN}@github.com/${UPSTREAM_REPO}.git" \
            "HEAD:refs/heads/${UPSTREAM_BRANCH}"
